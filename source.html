<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infraction Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --blue: #2563eb;
        --blue-light: #3b82f6;
        --pink: #db2777;
        --pink-light: #ec4899;
        --blue-infraction: linear-gradient(135deg, #1d4ed8 0%, #7f1d1d 100%);
        --pink-infraction: linear-gradient(135deg, #9d174d 0%, #7f1d1d 80%);
        --bg: #0a0e1a;
        --surface: #111827;
        --surface2: #1f2937;
        --border: #374151;
        --text: #f9fafb;
        --muted: #9ca3af;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: 'Rajdhani', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        background-image:
          radial-gradient(
            ellipse at 20% 50%,
            rgba(37, 99, 235, 0.08) 0%,
            transparent 60%
          ),
          radial-gradient(
            ellipse at 80% 20%,
            rgba(219, 39, 119, 0.08) 0%,
            transparent 60%
          );
      }
      .mono {
        font-family: 'DM Mono', monospace;
      }

      /* Timer */
      .timer-display {
        font-family: 'DM Mono', monospace;
        font-size: 2.8rem;
        letter-spacing: 0.08em;
        background: linear-gradient(90deg, #60a5fa, #f472b6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* Status pill */
      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 14px;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .status-idle {
        background: rgba(55, 65, 81, 0.8);
        color: #9ca3af;
      }
      .status-running {
        background: rgba(16, 185, 129, 0.15);
        color: #10b981;
        border: 1px solid rgba(16, 185, 129, 0.3);
      }
      .status-paused {
        background: rgba(245, 158, 11, 0.15);
        color: #f59e0b;
        border: 1px solid rgba(245, 158, 11, 0.3);
      }
      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: currentColor;
      }
      .status-running .status-dot {
        animation: pulse-dot 1s infinite;
      }
      @keyframes pulse-dot {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      /* Big counter buttons */
      .count-btn {
        position: relative;
        overflow: hidden;
        border: none;
        cursor: pointer;
        border-radius: 16px;
        padding: 20px 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        transition:
          transform 0.1s,
          box-shadow 0.15s;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .count-btn:active {
        transform: scale(0.96);
      }
      .count-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .count-btn:disabled:active {
        transform: none;
      }

      .btn-male {
        background: linear-gradient(
          145deg,
          #1e40af 0%,
          #2563eb 60%,
          #3b82f6 100%
        );
        box-shadow:
          0 8px 32px rgba(37, 99, 235, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }
      .btn-male:not(:disabled):hover {
        box-shadow:
          0 12px 40px rgba(37, 99, 235, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      .btn-female {
        background: linear-gradient(
          145deg,
          #9d174d 0%,
          #db2777 60%,
          #ec4899 100%
        );
        box-shadow:
          0 8px 32px rgba(219, 39, 119, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }
      .btn-female:not(:disabled):hover {
        box-shadow:
          0 12px 40px rgba(219, 39, 119, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      .btn-male-infraction {
        background: linear-gradient(
          135deg,
          #1d4ed8 0%,
          #4338ca 30%,
          #7f1d1d 100%
        );
        box-shadow:
          0 8px 32px rgba(127, 29, 29, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }
      .btn-male-infraction:not(:disabled):hover {
        box-shadow:
          0 12px 40px rgba(220, 38, 38, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      .btn-female-infraction {
        background: linear-gradient(
          135deg,
          #9d174d 0%,
          #7c3aed 40%,
          #7f1d1d 100%
        );
        box-shadow:
          0 8px 32px rgba(127, 29, 29, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.08);
      }
      .btn-female-infraction:not(:disabled):hover {
        box-shadow:
          0 12px 40px rgba(220, 38, 38, 0.5),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }

      .btn-ripple {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.25);
        transform: scale(0);
        animation: ripple-anim 0.5s linear;
        pointer-events: none;
      }
      @keyframes ripple-anim {
        to {
          transform: scale(4);
          opacity: 0;
        }
      }

      .count-icon {
        font-size: 2rem;
      }
      .count-label {
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        opacity: 0.9;
      }
      .count-number {
        font-family: 'DM Mono', monospace;
        font-size: 2.2rem;
        font-weight: 500;
        line-height: 1;
      }

      /* Bump animation */
      @keyframes bump {
        0% {
          transform: scale(1);
        }
        40% {
          transform: scale(1.12);
        }
        100% {
          transform: scale(1);
        }
      }
      .bumping {
        animation: bump 0.2s ease-out;
      }

      /* Control buttons */
      .ctrl-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 24px;
        border-radius: 10px;
        font-family: 'Rajdhani', sans-serif;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border: none;
        cursor: pointer;
        transition: all 0.15s;
      }
      .ctrl-start {
        background: linear-gradient(135deg, #059669, #10b981);
        color: white;
        box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
      }
      .ctrl-start:hover {
        box-shadow: 0 6px 24px rgba(16, 185, 129, 0.5);
      }
      .ctrl-pause {
        background: linear-gradient(135deg, #d97706, #f59e0b);
        color: white;
        box-shadow: 0 4px 16px rgba(245, 158, 11, 0.3);
      }
      .ctrl-pause:hover {
        box-shadow: 0 6px 24px rgba(245, 158, 11, 0.5);
      }
      .ctrl-resume {
        background: linear-gradient(135deg, #059669, #10b981);
        color: white;
        box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
      }
      .ctrl-resume:hover {
        box-shadow: 0 6px 24px rgba(16, 185, 129, 0.5);
      }
      .ctrl-end {
        background: linear-gradient(135deg, #dc2626, #ef4444);
        color: white;
        box-shadow: 0 4px 16px rgba(239, 68, 68, 0.3);
      }
      .ctrl-end:hover {
        box-shadow: 0 6px 24px rgba(239, 68, 68, 0.5);
      }

      /* Stats surface */
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 18px;
      }

      /* History */
      .history-item {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px 20px;
        cursor: pointer;
        transition:
          border-color 0.15s,
          background 0.15s;
      }
      .history-item:hover {
        border-color: #4b5563;
        background: var(--surface2);
      }

      /* Modal */
      .modal-bg {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        animation: fade-in 0.2s ease;
      }
      @keyframes fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .modal-card {
        background: #111827;
        border: 1px solid #374151;
        border-radius: 20px;
        padding: 32px;
        width: min(520px, 95vw);
        max-height: 90vh;
        overflow-y: auto;
        animation: slide-up 0.25s ease;
      }
      @keyframes slide-up {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      /* Donut legend */
      .legend-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      /* Divider */
      .divider {
        border-color: var(--border);
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #374151;
        border-radius: 3px;
      }
    </style>
  </head>
  <body class="min-h-screen p-4 pb-8">
    <div class="mx-auto max-w-lg">
      <!-- Header -->
      <div class="pt-6 pb-4 text-center">
        <div class="mb-1 flex items-center justify-center gap-3">
          <i class="fa-solid fa-mobile-screen-button text-xl text-red-400"></i>
          <h1
            class="text-2xl font-bold tracking-widest uppercase"
            style="letter-spacing: 0.18em"
          >
            Infraction Tracker
          </h1>
          <i class="fa-solid fa-car text-xl text-blue-400"></i>
        </div>
        <p class="text-sm tracking-wider text-gray-500 uppercase">
          Smartphone use while driving
        </p>
      </div>

      <!-- Measurement Control Panel -->
      <div class="stat-card mb-4">
        <!-- Timer & Status row -->
        <div class="mb-4 flex items-center justify-between">
          <div>
            <div class="timer-display" id="timerDisplay">00:00:00</div>
            <div class="mt-1">
              <span class="status-pill status-idle" id="statusPill">
                <span class="status-dot"></span>
                <span id="statusText">Idle</span>
              </span>
            </div>
          </div>
          <div class="text-right">
            <div class="mb-1 text-xs tracking-widest text-gray-500 uppercase">
              Total observed
            </div>
            <div class="mono text-4xl font-medium text-white" id="totalCount">
              0
            </div>
          </div>
        </div>

        <!-- Control buttons — space pre-allocated for End button -->
        <div class="flex items-center gap-3">
          <button
            class="ctrl-btn ctrl-start flex-1"
            id="startPauseBtn"
            onclick="handleStartPause()"
          >
            <i class="fa-solid fa-play" id="startPauseIcon"></i>
            <span id="startPauseLabel">Start</span>
          </button>
          <!-- End button always present, invisible when not needed -->
          <button
            class="ctrl-btn ctrl-end"
            id="endBtn"
            onclick="handleEnd()"
            style="visibility: hidden"
          >
            <i class="fa-solid fa-flag-checkered"></i>
            <span>End</span>
          </button>
        </div>
      </div>

      <!-- Count Buttons -->
      <div class="mb-4 grid grid-cols-2 gap-3">
        <button
          class="count-btn btn-male"
          id="btnMale"
          onclick="register('male')"
          disabled
        >
          <i class="fa-solid fa-person count-icon"></i>
          <span class="count-label">Male</span>
          <span class="count-number" id="numMale">0</span>
        </button>
        <button
          class="count-btn btn-female"
          id="btnFemale"
          onclick="register('female')"
          disabled
        >
          <i class="fa-solid fa-person-dress count-icon"></i>
          <span class="count-label">Female</span>
          <span class="count-number" id="numFemale">0</span>
        </button>
        <button
          class="count-btn btn-male-infraction"
          id="btnMalePhone"
          onclick="register('malePhone')"
          disabled
        >
          <div class="flex items-center gap-2">
            <i class="fa-solid fa-person count-icon"></i>
            <i
              class="fa-solid fa-mobile-screen-button"
              style="font-size: 1.3rem; color: #fca5a5"
            ></i>
          </div>
          <span class="count-label">Male + Phone</span>
          <span class="count-number" id="numMalePhone">0</span>
        </button>
        <button
          class="count-btn btn-female-infraction"
          id="btnFemalePhone"
          onclick="register('femalePhone')"
          disabled
        >
          <div class="flex items-center gap-2">
            <i class="fa-solid fa-person-dress count-icon"></i>
            <i
              class="fa-solid fa-mobile-screen-button"
              style="font-size: 1.3rem; color: #fca5a5"
            ></i>
          </div>
          <span class="count-label">Female + Phone</span>
          <span class="count-number" id="numFemalePhone">0</span>
        </button>
      </div>

      <!-- Live Stats & Chart -->
      <div class="stat-card mb-4">
        <div
          class="mb-3 flex items-center gap-2 text-xs tracking-widest text-gray-500 uppercase"
        >
          <i class="fa-solid fa-chart-pie text-gray-600"></i> Live infraction
          breakdown
        </div>

        <!-- Pie chart -->
        <div class="flex items-center gap-4">
          <div style="width: 140px; height: 140px; flex-shrink: 0">
            <canvas id="liveChart"></canvas>
          </div>
          <div class="flex-1">
            <!-- Legend + percentages -->
            <div class="space-y-2" id="liveStats">
              <div class="flex items-center gap-2 text-sm">
                <span class="legend-dot" style="background: #2563eb"></span>
                <span class="text-gray-400">Male infraction</span>
                <span
                  class="mono ml-auto font-medium text-blue-400"
                  id="pctMale"
                  >—</span
                >
              </div>
              <div class="flex items-center gap-2 text-sm">
                <span class="legend-dot" style="background: #db2777"></span>
                <span class="text-gray-400">Female infraction</span>
                <span
                  class="mono ml-auto font-medium text-pink-400"
                  id="pctFemale"
                  >—</span
                >
              </div>
              <hr class="divider my-2" />
              <div class="flex items-center gap-2 text-sm">
                <span class="legend-dot" style="background: #6b7280"></span>
                <span class="text-gray-400">No infraction</span>
                <span
                  class="mono ml-auto font-medium text-gray-400"
                  id="pctNone"
                  >—</span
                >
              </div>
              <hr class="divider my-2" />
              <div class="space-y-1 text-xs text-gray-500">
                <div class="flex justify-between">
                  <span>Total male infraction rate</span>
                  <span class="mono text-blue-400" id="rateMale">—</span>
                </div>
                <div class="flex justify-between">
                  <span>Total female infraction rate</span>
                  <span class="mono text-pink-400" id="rateFemale">—</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- History -->
      <div id="historySection" style="display: none">
        <div
          class="mb-3 flex items-center gap-2 text-xs tracking-widest text-gray-500 uppercase"
        >
          <i class="fa-solid fa-clock-rotate-left text-gray-600"></i> Past
          measurements
        </div>
        <div id="historyList" class="space-y-2"></div>
      </div>
    </div>

    <!-- Modal -->
    <div
      class="modal-bg"
      id="modal"
      style="display: none"
      onclick="closeModal(event)"
    >
      <div class="modal-card" onclick="event.stopPropagation()">
        <div class="mb-4 flex items-center justify-between">
          <div>
            <h2 class="text-xl font-bold tracking-wide" id="modalTitle">
              Measurement Results
            </h2>
            <p class="mono mt-0.5 text-xs text-gray-500" id="modalMeta"></p>
          </div>
          <button
            onclick="closeModal()"
            class="p-2 text-xl text-gray-500 transition-colors hover:text-white"
          >
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="mb-6 flex justify-center" style="height: 200px">
          <canvas id="modalChart"></canvas>
        </div>

        <div class="mb-4 space-y-2" id="modalLegend"></div>
        <hr class="divider my-4" />
        <div class="grid grid-cols-3 gap-3" id="modalStats"></div>
      </div>
    </div>

    <script>
      // ── State ──────────────────────────────────────────────────────────────────
      let state = 'idle'; // idle | running | paused
      let counts = { male: 0, female: 0, malePhone: 0, femalePhone: 0 };
      let startTime = null;
      let elapsed = 0; // ms accumulated before pause
      let timerInterval = null;
      let measurements = [];
      let modalChartInst = null;

      // ── Chart ──────────────────────────────────────────────────────────────────
      const liveCtx = document.getElementById('liveChart').getContext('2d');
      const chartColors = ['#2563eb', '#db2777', '#374151'];
      const liveChartInst = new Chart(liveCtx, {
        type: 'doughnut',
        data: {
          labels: ['Male+Phone', 'Female+Phone', 'No infraction'],
          datasets: [
            {
              data: [1, 1, 1],
              backgroundColor: chartColors,
              borderWidth: 2,
              borderColor: '#111827',
              hoverOffset: 6,
            },
          ],
        },
        options: {
          cutout: '68%',
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          animation: { duration: 300 },
          responsive: true,
          maintainAspectRatio: true,
        },
      });

      // ── Timer ──────────────────────────────────────────────────────────────────
      function formatTime(ms) {
        const s = Math.floor(ms / 1000);
        const h = Math.floor(s / 3600)
          .toString()
          .padStart(2, '0');
        const m = Math.floor((s % 3600) / 60)
          .toString()
          .padStart(2, '0');
        const sec = (s % 60).toString().padStart(2, '0');
        return `${h}:${m}:${sec}`;
      }

      function getElapsed() {
        if (state === 'running') return elapsed + (Date.now() - startTime);
        return elapsed;
      }

      function tickTimer() {
        document.getElementById('timerDisplay').textContent =
          formatTime(getElapsed());
      }

      // ── Controls ──────────────────────────────────────────────────────────────
      function handleStartPause() {
        if (state === 'idle') {
          // Start
          state = 'running';
          startTime = Date.now();
          elapsed = 0;
          counts = { male: 0, female: 0, malePhone: 0, femalePhone: 0 };
          updateCountDisplay();
          timerInterval = setInterval(tickTimer, 200);
          setUI('running');
        } else if (state === 'running') {
          // Pause
          elapsed += Date.now() - startTime;
          clearInterval(timerInterval);
          state = 'paused';
          setUI('paused');
        } else if (state === 'paused') {
          // Resume
          startTime = Date.now();
          timerInterval = setInterval(tickTimer, 200);
          state = 'running';
          setUI('running');
        }
      }

      function handleEnd() {
        if (state === 'idle') return;
        if (state === 'running') elapsed += Date.now() - startTime;
        clearInterval(timerInterval);

        // Save measurement
        const snap = {
          id: Date.now(),
          date: new Date(),
          duration: elapsed,
          counts: { ...counts },
        };
        measurements.unshift(snap);
        renderHistory();

        // Reset
        state = 'idle';
        elapsed = 0;
        counts = { male: 0, female: 0, malePhone: 0, femalePhone: 0 };
        updateCountDisplay();
        document.getElementById('timerDisplay').textContent = '00:00:00';
        setUI('idle');
      }

      function setUI(s) {
        const btn = document.getElementById('startPauseBtn');
        const icon = document.getElementById('startPauseIcon');
        const label = document.getElementById('startPauseLabel');
        const endBtn = document.getElementById('endBtn');
        const pill = document.getElementById('statusPill');
        const pillText = document.getElementById('statusText');
        const countBtns = [
          'btnMale',
          'btnFemale',
          'btnMalePhone',
          'btnFemalePhone',
        ];

        pill.className = 'status-pill';
        if (s === 'idle') {
          btn.className = 'ctrl-btn ctrl-start flex-1';
          icon.className = 'fa-solid fa-play';
          label.textContent = 'Start';
          endBtn.style.visibility = 'hidden';
          pill.classList.add('status-idle');
          pillText.textContent = 'Idle';
          countBtns.forEach(
            (id) => (document.getElementById(id).disabled = true)
          );
        } else if (s === 'running') {
          btn.className = 'ctrl-btn ctrl-pause flex-1';
          icon.className = 'fa-solid fa-pause';
          label.textContent = 'Pause';
          endBtn.style.visibility = 'visible';
          pill.classList.add('status-running');
          pillText.textContent = 'Running';
          countBtns.forEach(
            (id) => (document.getElementById(id).disabled = false)
          );
        } else if (s === 'paused') {
          btn.className = 'ctrl-btn ctrl-resume flex-1';
          icon.className = 'fa-solid fa-play';
          label.textContent = 'Resume';
          endBtn.style.visibility = 'visible';
          pill.classList.add('status-paused');
          pillText.textContent = 'Paused';
          countBtns.forEach(
            (id) => (document.getElementById(id).disabled = true)
          );
        }
      }

      // ── Register ──────────────────────────────────────────────────────────────
      function register(type) {
        if (state !== 'running') return;
        counts[type]++;
        updateCountDisplay();
        bumpAnim(type);
      }

      function bumpAnim(type) {
        const map = {
          male: 'btnMale',
          female: 'btnFemale',
          malePhone: 'btnMalePhone',
          femalePhone: 'btnFemalePhone',
        };
        const btn = document.getElementById(map[type]);
        btn.classList.remove('bumping');
        void btn.offsetWidth;
        btn.classList.add('bumping');
        btn.addEventListener(
          'animationend',
          () => btn.classList.remove('bumping'),
          { once: true }
        );

        // Ripple
        const ripple = document.createElement('span');
        ripple.className = 'btn-ripple';
        const size = Math.max(btn.offsetWidth, btn.offsetHeight);
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = btn.offsetWidth / 2 - size / 2 + 'px';
        ripple.style.top = btn.offsetHeight / 2 - size / 2 + 'px';
        btn.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      }

      function updateCountDisplay() {
        const { male, female, malePhone, femalePhone } = counts;
        document.getElementById('numMale').textContent = male;
        document.getElementById('numFemale').textContent = female;
        document.getElementById('numMalePhone').textContent = malePhone;
        document.getElementById('numFemalePhone').textContent = femalePhone;
        const total = male + female + malePhone + femalePhone;
        document.getElementById('totalCount').textContent = total;
        updateLiveChart(counts);
      }

      function updateLiveChart(c) {
        const { male, female, malePhone, femalePhone } = c;
        const total = male + female + malePhone + femalePhone;
        const noInfraction = male + female;
        const hasData = total > 0;

        if (!hasData) {
          liveChartInst.data.datasets[0].data = [1, 1, 1];
          liveChartInst.data.datasets[0].backgroundColor = [
            '#1f2937',
            '#1f2937',
            '#1f2937',
          ];
          document.getElementById('pctMale').textContent = '—';
          document.getElementById('pctFemale').textContent = '—';
          document.getElementById('pctNone').textContent = '—';
          document.getElementById('rateMale').textContent = '—';
          document.getElementById('rateFemale').textContent = '—';
        } else {
          liveChartInst.data.datasets[0].data = [
            malePhone || 0.001,
            femalePhone || 0.001,
            noInfraction || 0.001,
          ];
          liveChartInst.data.datasets[0].backgroundColor = chartColors;
          const pM = pct(malePhone, total);
          const pF = pct(femalePhone, total);
          const pN = pct(noInfraction, total);
          document.getElementById('pctMale').textContent = pM + '%';
          document.getElementById('pctFemale').textContent = pF + '%';
          document.getElementById('pctNone').textContent = pN + '%';

          const totalMale = male + malePhone;
          const totalFemale = female + femalePhone;
          document.getElementById('rateMale').textContent = totalMale
            ? pct(malePhone, totalMale) + '%'
            : '—';
          document.getElementById('rateFemale').textContent = totalFemale
            ? pct(femalePhone, totalFemale) + '%'
            : '—';
        }
        liveChartInst.update();
      }

      function pct(n, d) {
        if (!d) return 0;
        return Math.round((n / d) * 100);
      }

      // ── History ────────────────────────────────────────────────────────────────
      function renderHistory() {
        const section = document.getElementById('historySection');
        const list = document.getElementById('historyList');
        section.style.display = measurements.length ? 'block' : 'none';
        list.innerHTML = '';

        measurements.forEach((m, i) => {
          const { male, female, malePhone, femalePhone } = m.counts;
          const total = male + female + malePhone + femalePhone;
          const infractions = malePhone + femalePhone;
          const infrPct = total ? pct(infractions, total) : 0;
          const dateStr = m.date.toLocaleDateString(undefined, {
            month: 'short',
            day: 'numeric',
          });
          const timeStr = m.date.toLocaleTimeString(undefined, {
            hour: '2-digit',
            minute: '2-digit',
          });

          const el = document.createElement('div');
          el.className = 'history-item';
          el.innerHTML = `
      <div class="flex items-center justify-between">
        <div>
          <div class="font-semibold tracking-wide">Measurement #${measurements.length - i}</div>
          <div class="text-xs text-gray-500 mono mt-0.5">${dateStr} · ${timeStr} · ${formatTime(m.duration)}</div>
        </div>
        <div class="text-right">
          <div class="mono text-lg font-medium ${infrPct > 50 ? 'text-red-400' : infrPct > 20 ? 'text-amber-400' : 'text-green-400'}">${infrPct}%</div>
          <div class="text-xs text-gray-500">infraction rate</div>
        </div>
        <i class="fa-solid fa-chevron-right text-gray-600 ml-3"></i>
      </div>
      <div class="flex gap-3 mt-3">
        <div class="flex items-center gap-1.5 text-xs">
          <span class="w-2 h-2 rounded-full" style="background:#2563eb;"></span>
          <span class="text-gray-400">${male} <span class="text-blue-400">+${malePhone}📱</span></span>
        </div>
        <div class="flex items-center gap-1.5 text-xs">
          <span class="w-2 h-2 rounded-full" style="background:#db2777;"></span>
          <span class="text-gray-400">${female} <span class="text-pink-400">+${femalePhone}📱</span></span>
        </div>
        <div class="text-xs text-gray-500 ml-auto">${total} observed</div>
      </div>
    `;
          el.onclick = () => openModal(m);
          list.appendChild(el);
        });
      }

      // ── Modal ──────────────────────────────────────────────────────────────────
      function openModal(m) {
        const { male, female, malePhone, femalePhone } = m.counts;
        const total = male + female + malePhone + femalePhone;
        const noInfraction = male + female;

        document.getElementById('modalTitle').textContent =
          'Measurement Results';
        document.getElementById('modalMeta').textContent =
          m.date.toLocaleDateString(undefined, {
            weekday: 'long',
            month: 'long',
            day: 'numeric',
          }) +
          ' · ' +
          formatTime(m.duration) +
          ' duration · ' +
          total +
          ' observed';

        // Chart
        if (modalChartInst) modalChartInst.destroy();
        const ctx = document.getElementById('modalChart').getContext('2d');
        const hasData = total > 0;
        modalChartInst = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: ['Male + Phone', 'Female + Phone', 'No infraction'],
            datasets: [
              {
                data: hasData
                  ? [
                      malePhone || 0.001,
                      femalePhone || 0.001,
                      noInfraction || 0.001,
                    ]
                  : [1, 1, 1],
                backgroundColor: hasData
                  ? chartColors
                  : ['#1f2937', '#1f2937', '#374151'],
                borderWidth: 3,
                borderColor: '#111827',
                hoverOffset: 8,
              },
            ],
          },
          options: {
            cutout: '65%',
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: (ctx) =>
                    ` ${ctx.label}: ${hasData ? pct(ctx.raw, total) : 0}%`,
                },
              },
            },
            responsive: true,
            maintainAspectRatio: true,
          },
        });

        // Legend
        const legend = document.getElementById('modalLegend');
        const rows = [
          { color: '#2563eb', label: 'Male + Phone', value: malePhone },
          { color: '#db2777', label: 'Female + Phone', value: femalePhone },
          { color: '#374151', label: 'No infraction', value: noInfraction },
        ];
        legend.innerHTML = rows
          .map(
            (r) => `
    <div class="flex items-center gap-3 text-sm">
      <span class="legend-dot" style="background:${r.color};"></span>
      <span class="text-gray-300 flex-1">${r.label}</span>
      <span class="mono text-gray-400">${r.value}</span>
      <span class="mono font-medium w-12 text-right" style="color:${r.color};">${total ? pct(r.value, total) : 0}%</span>
    </div>
  `
          )
          .join('');

        // Stats
        const totalMale = male + malePhone;
        const totalFemale = female + femalePhone;
        const stats = document.getElementById('modalStats');
        stats.innerHTML = `
    <div class="stat-card text-center">
      <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">Male rate</div>
      <div class="mono text-2xl text-blue-400">${totalMale ? pct(malePhone, totalMale) : 0}%</div>
      <div class="text-xs text-gray-600 mt-1">${malePhone}/${totalMale}</div>
    </div>
    <div class="stat-card text-center">
      <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">Female rate</div>
      <div class="mono text-2xl text-pink-400">${totalFemale ? pct(femalePhone, totalFemale) : 0}%</div>
      <div class="text-xs text-gray-600 mt-1">${femalePhone}/${totalFemale}</div>
    </div>
    <div class="stat-card text-center">
      <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">Overall</div>
      <div class="mono text-2xl text-white">${total ? pct(malePhone + femalePhone, total) : 0}%</div>
      <div class="text-xs text-gray-600 mt-1">${malePhone + femalePhone}/${total}</div>
    </div>
  `;

        document.getElementById('modal').style.display = 'flex';
      }

      function closeModal(e) {
        if (!e || e.target === document.getElementById('modal')) {
          document.getElementById('modal').style.display = 'none';
        }
      }

      // Init chart
      updateLiveChart({ male: 0, female: 0, malePhone: 0, femalePhone: 0 });
    </script>
  </body>
</html>
